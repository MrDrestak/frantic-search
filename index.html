
<!-- VERSION 1.0.0 - Estable -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frantic Search — El mercado TCG del Perú</title>
    <meta name="description" content="Compra, vende e intercambia cartas de Magic: The Gathering en Perú. Precios de Card Kingdom en soles, matches automáticos y reputación verificada." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                slate: {
                    950: '#020617',
                }
              },
              gridTemplateColumns: {
                '20': 'repeat(20, minmax(0, 1fr))',
              },
              gridColumn: {
                'span-15': 'span 15 / span 15',
                'span-5': 'span 5 / span 5',
                'span-12': 'span 12 / span 12',
                'span-8': 'span 8 / span 8',
              },
              animation: {
                  'shine': 'shine 1s',
                  'gradient-x': 'gradient-x 3s ease infinite',
              },
              keyframes: {
                  shine: {
                      '100%': { left: '125%' },
                  },
                  'gradient-x': {
                      '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                      '50%': { 'background-size': '200% 200%', 'background-position': 'right center' }
                  }
              }
            }
          }
        }
    </script>
    <style>
        body { background-color: #020617; }
        .ring-rainbow {
            border-image: linear-gradient(to right, #ef4444, #eab308, #22c55e, #3b82f6, #a855f7) 1;
        }
        .bg-rainbow {
            background-image: linear-gradient(to right, #ef4444, #eab308, #22c55e, #3b82f6, #a855f7);
        }
        .perspective-1000 {
            perspective: 1000px;
        }
        .animate-gradient-x {
            background-size: 200% auto;
            animation: gradient-x 3s linear infinite;
        }
    </style>
    <style>
      /* Foil border animation */
      @property --angle {
        syntax: '<angle>';
        initial-value: 0deg;
        inherits: false;
      }
      .foil-border {
        padding: 2px;
        border-radius: 14px;
        background: conic-gradient(from var(--angle), #7c3aed, #22c55e, #3b82f6, #f59e0b, #ec4899, #7c3aed);
        animation: foil-rotate 4s linear infinite;
      }
      @keyframes foil-rotate { to { --angle: 360deg; } }

      /* Scroll reveal */
      .reveal {
        opacity: 0;
        transform: translateY(32px);
        transition: opacity 0.7s cubic-bezier(0.16,1,0.3,1), transform 0.7s cubic-bezier(0.16,1,0.3,1);
      }
      .reveal.revealed { opacity: 1; transform: translateY(0); }
      .reveal-d1 { transition-delay: 0.1s; }
      .reveal-d2 { transition-delay: 0.2s; }
      .reveal-d3 { transition-delay: 0.3s; }

      /* Logo float */
      @keyframes logo-float {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-6px); }
      }
      .logo-float { animation: logo-float 3s ease-in-out infinite; }

      /* Uncommon badge pulse */
      @keyframes badge-pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
        50%       { box-shadow: 0 0 0 7px rgba(34,197,94,0); }
      }
      .badge-pulse { animation: badge-pulse 2.2s ease-in-out infinite; }

      /* CTA hover */
      .cta-primary { transition: transform 0.2s ease, box-shadow 0.2s ease; }
      .cta-primary:hover { transform: scale(1.03); box-shadow: 0 0 28px rgba(124,58,237,0.55); }
    </style>
    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
