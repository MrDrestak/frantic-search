name: CI

on:
  push:
    branches: [main, migration-v2]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local
        run: supabase start

      - name: Apply migrations
        run: supabase db reset --no-seed

      - name: Export Supabase keys
        run: |
          STATUS=$(supabase status --output json)
          echo "VITE_SUPABASE_URL=$(echo "$STATUS" | jq -r '.API_URL // .api_url // "http://127.0.0.1:54321"')" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=$(echo "$STATUS" | jq -r '.ANON_KEY // .anon_key // .PUBLISHABLE_KEY // .publishable_key')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY // .service_role_key // .SECRET_KEY // .secret_key')" >> $GITHUB_ENV

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint
