name: CI

on:
  push:
    branches: [main, migration-v2]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # supabase CLI is a devDependency — no separate action needed
      - name: Start Supabase local
        run: npx supabase start

      - name: Apply migrations
        run: npx supabase db reset --no-seed

      - name: Export Supabase keys
        run: |
          STATUS=$(npx supabase status --output json)
          echo "VITE_SUPABASE_URL=$(echo "$STATUS" | jq -r '.api_url // .API_URL // "http://127.0.0.1:54321"')" >> $GITHUB_ENV
          JWT_SECRET=$(echo "$STATUS" | jq -r '.jwt_secret // .JWT_SECRET // "super-secret-jwt-token-with-at-least-32-characters-long"')
          JWT_SECRET="$JWT_SECRET" node scripts/generate-ci-jwt.mjs

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint
