name: Close Stale Interactions

on:
  schedule:
    - cron: '0 10 * * *'  # 5:00 AM PET = 10:00 AM UTC
  workflow_dispatch:       # manual trigger desde GitHub Actions UI

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/close-stale-interactions.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
